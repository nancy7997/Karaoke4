<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karaoke Roulette</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
  text-align:center;
}

/* CENTER */
.center{
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  height:100vh;
}

/* TITLE */
#titleWheel{
  font-size:8vw;
  font-weight:bold;
  color:red;
  -webkit-text-stroke:2px white;
  animation:spin 4s ease-out forwards;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(1080deg);}
}

/* DECADES FLOAT */
.decade{
  position:absolute;
  font-size:4vw;
  opacity:0;
  animation:flicker 3s infinite;
}

@keyframes flicker{
  0%,100%{opacity:0;}
  50%{opacity:1;}
}

/* GAME */
.topBar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  font-size:20px;
}

canvas{
  margin:10px;
}

button{
  padding:10px 20px;
  font-size:18px;
  margin:5px;
}

.grey{
  opacity:0.3;
}

/* WIN SCREEN */
.winText{
  font-size:8vw;
  font-weight:bold;
  animation:rainbow 2s infinite linear;
}

@keyframes rainbow{
  0%{color:red;}
  20%{color:orange;}
  40%{color:yellow;}
  60%{color:green;}
  80%{color:blue;}
  100%{color:purple;}
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro" class="center">
  <div id="titleWheel">KARAOKE ROULETTE</div>
</div>

<!-- TEAM INPUT -->
<div id="teams" class="center" style="display:none;">
  <h2>Enter Team Names</h2>
  <input id="t1" placeholder="Team 1"><br>
  <input id="t2" placeholder="Team 2"><br>
  <button onclick="startGame()">Start Game</button>
</div>

<script>

/* FLOATING DECADES */
const decades = ["50s","60s","70s","80s","90s","00s","10s","20s"];
decades.forEach(d=>{
  let el=document.createElement("div");
  el.className="decade";
  el.innerText=d;
  el.style.top=Math.random()*90+"%";
  el.style.left=Math.random()*90+"%";
  el.style.animationDelay=Math.random()*3+"s";
  document.body.appendChild(el);
});

/* INTRO TIMING */
setTimeout(()=>{
  document.getElementById("intro").style.display="none";
  document.getElementById("teams").style.display="flex";
},6000);

/* GAME STATE */
let team1, team2;
let score1=0, score2=0;
let round=1;
let currentTeam=1;
let selectedCategory="";
let selectedMethod="";

/* START GAME */
function startGame(){
  team1=document.getElementById("t1").value;
  team2=document.getElementById("t2").value;

  document.body.innerHTML=`
  <div class="topBar">
    <div>${team1}: <span id="s1">0</span></div>
    <div id="round">Round 1/5</div>
    <div>${team2}: <span id="s2">0</span></div>
  </div>

  <h2 id="turn">${team1}'s Turn</h2>

  <canvas id="wheel1" width="250" height="250"></canvas><br>
  <button onclick="spinCategory()">Spin Category</button>

  <canvas id="wheel2" width="250" height="250" class="grey"></canvas><br>
  <button id="spin2" disabled onclick="spinMethod()">Spin Method</button>

  <h3 id="category"></h3>
  <h3 id="method"></h3>

  <h2 id="timer">1:30</h2>
  <button id="timerBtn" onclick="toggleTimer()">Start</button>
  `;

  drawWheel1();
  drawWheel2();
}

/* DRAW CATEGORY WHEEL */
const categories=["1950s-70s","1980s","1990s","2000s","2010s","2020s","Audience"];

function drawWheel1(){
  let c=document.getElementById("wheel1");
  let ctx=c.getContext("2d");
  let colors=["red","orange","yellow","green","blue","purple","pink"];

  for(let i=0;i<7;i++){
    ctx.beginPath();
    ctx.moveTo(125,125);
    ctx.arc(125,125,125,i*(2*Math.PI/7),(i+1)*(2*Math.PI/7));
    ctx.fillStyle=colors[i];
    ctx.fill();

    ctx.fillStyle="black";
    ctx.fillText(categories[i],90,125);
  }
}

/* DRAW METHOD WHEEL */
const methods=["Karaoke","Name","Karaoke","Name","Karaoke","Name"];

function drawWheel2(){
  let c=document.getElementById("wheel2");
  let ctx=c.getContext("2d");

  for(let i=0;i<6;i++){
    ctx.beginPath();
    ctx.moveTo(125,125);
    ctx.arc(125,125,125,i*(2*Math.PI/6),(i+1)*(2*Math.PI/6));
    ctx.fillStyle=i%2==0?"white":"black";
    ctx.fill();

    ctx.fillStyle="black";
    ctx.fillText(methods[i],90,125);
  }
}

/* SPIN CATEGORY */
function spinCategory(){
  selectedCategory=categories[Math.floor(Math.random()*categories.length)];
  document.getElementById("category").innerText=selectedCategory;

  document.getElementById("spin2").disabled=false;
  document.getElementById("wheel2").classList.remove("grey");
}

/* SPIN METHOD */
function spinMethod(){
  selectedMethod=methods[Math.floor(Math.random()*methods.length)];
  document.getElementById("method").innerText=selectedMethod;

  if(selectedMethod==="Karaoke"){
    let res=confirm("Did the team sing?");
    addScore(res?100:0);
  } else {
    let res=prompt("song / artist / both / none");
    if(res==="song") addScore(10);
    else if(res==="artist") addScore(15);
    else if(res==="both") addScore(50);
    else addScore(0);
  }
}

/* SCORE */
function addScore(points){
  if(currentTeam===1){
    score1+=points;
    document.getElementById("s1").innerText=score1;
  }else{
    score2+=points;
    document.getElementById("s2").innerText=score2;
  }

  nextTurn();
}

/* NEXT TURN */
function nextTurn(){
  if(currentTeam===1){
    currentTeam=2;
  }else{
    currentTeam=1;
    round++;
  }

  if(round>5){
    endGame();
    return;
  }

  document.getElementById("round").innerText=`Round ${round}/5`;
  document.getElementById("turn").innerText=
    currentTeam===1?`${team1}'s Turn`:`${team2}'s Turn`;

  document.getElementById("spin2").disabled=true;
  document.getElementById("wheel2").classList.add("grey");
}

/* TIMER */
let time=90;
let running=false;
let interval;

function toggleTimer(){
  if(!running){
    running=true;
    document.getElementById("timerBtn").innerText="Stop";

    interval=setInterval(()=>{
      time--;
      let m=Math.floor(time/60);
      let s=time%60;
      document.getElementById("timer").innerText=
        m+":"+(s<10?"0"+s:s);

      if(time<=0){
        clearInterval(interval);
      }
    },1000);

  }else{
    running=false;
    clearInterval(interval);
    document.getElementById("timerBtn").innerText="Start";
  }
}

/* END GAME */
function endGame(){
  let winner=score1>score2?team1:team2;

  document.body.innerHTML=`
  <div class="center">
    <div class="winText">CONGRATULATIONS</div>
    <h1>${winner} Wins!</h1>
  </div>
  `;
}

</script>

</body>
</html>
