<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Karaoke Roulette</title>

<style>
:root {
    --green:#1DB954;
    --black:#121212;
    --dark:#282828;
    --white:#FFFFFF;
}

body{
    margin:0;
    background:var(--black);
    color:white;
    font-family:Arial;
    display:flex;
    flex-direction:column;
    height:100vh;
}

/* INTRO */
#intro{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:8vw;
    font-weight:bold;
    color:red;
    -webkit-text-stroke:2px white;
    animation:spin 4s ease-out forwards;
    z-index:1000;
}

@keyframes spin{
    0%{transform:rotate(0);}
    100%{transform:rotate(1080deg);}
}

/* GAME */
#game{display:none; flex-direction:column; height:100%;}

.top{
    display:flex;
    justify-content:space-between;
    padding:10px;
    background:var(--dark);
}

.score{font-size:18px;}
.active{border-bottom:3px solid var(--green);}

.wheels{
    flex:1;
    display:flex;
    justify-content:space-around;
    align-items:center;
    flex-wrap:wrap;
}

.wheelBox{
    display:flex;
    flex-direction:column;
    align-items:center;
}

canvas{
    width:260px;
    height:260px;
    border-radius:50%;
    border:3px solid white;
    transition:transform 4s cubic-bezier(0.1,0.7,0.2,1);
}

.grey{opacity:.3;}

button{
    padding:10px 20px;
    margin:5px;
    font-size:16px;
}

#timer{
    font-size:40px;
}

#winner{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.win{
    font-size:8vw;
    animation:rainbow 2s infinite;
}

@keyframes rainbow{
0%{color:red;}20%{color:orange;}40%{color:yellow;}
60%{color:green;}80%{color:blue;}100%{color:purple;}
}
</style>
</head>

<body>

<div id="intro">KARAOKE ROULETTE</div>

<div id="game">

<div class="top">
<div id="team1" class="score active">Team 1: <span id="s1">0</span></div>
<div id="round">Round 1/5</div>
<div id="team2" class="score">Team 2: <span id="s2">0</span></div>
</div>

<h2 id="turn">Team 1 Turn</h2>

<div class="wheels">

<div class="wheelBox">
<canvas id="wheel1" width="600" height="600"></canvas>
<button onclick="spinCategory()">Spin Category</button>
</div>

<div class="wheelBox">
<canvas id="wheel2" width="600" height="600" class="grey"></canvas>
<button id="spin2" onclick="spinMethod()" disabled>Spin Method</button>
</div>

</div>

<h3 id="category"></h3>
<h3 id="method"></h3>

<div id="timer">1:30</div>
<button onclick="toggleTimer()" id="timerBtn">Start</button>

</div>

<div id="winner">
<div class="win">CONGRATULATIONS</div>
<h1 id="winnerName"></h1>
</div>

<script>

let t1=prompt("Team 1 name","Team 1");
let t2=prompt("Team 2 name","Team 2");

document.getElementById("team1").innerHTML=t1+": <span id='s1'>0</span>";
document.getElementById("team2").innerHTML=t2+": <span id='s2'>0</span>";

setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("game").style.display="flex";
},4000);

/* DATA */
const categories=["1950s-70s","1980s","1990s","2000s","2010s","2020s","Audience"];
const methods=["Karaoke","Name","Karaoke","Name","Karaoke","Name"];

let score1=0,score2=0;
let current=1;
let round=1;

let rot1=0,rot2=0;

/* DRAW */
const ctx1=document.getElementById("wheel1").getContext("2d");
const ctx2=document.getElementById("wheel2").getContext("2d");

function drawWheel(ctx,data,colors){
let n=data.length;
let angle=(2*Math.PI)/n;

for(let i=0;i<n;i++){
ctx.beginPath();
ctx.moveTo(300,300);
ctx.arc(300,300,290,i*angle,(i+1)*angle);
ctx.fillStyle=colors[i];
ctx.fill();

ctx.save();
ctx.translate(300,300);
ctx.rotate(i*angle+angle/2);
ctx.fillStyle="black";
ctx.font="bold 24px Arial";
ctx.fillText(data[i],200,10);
ctx.restore();
}
}

drawWheel(ctx1,categories,["red","orange","yellow","green","blue","purple","pink"]);
drawWheel(ctx2,methods,["white","black","white","black","white","black"]);

/* CATEGORY SPIN */
function spinCategory(){
let i=Math.floor(Math.random()*categories.length);
let deg=360/categories.length;
let stop=360-(i*deg)-deg/2;

rot1+=360*5+stop-(rot1%360);
wheel1.style.transform=`rotate(${rot1}deg)`;

setTimeout(()=>{
document.getElementById("category").innerText=categories[i];
document.getElementById("spin2").disabled=false;
wheel2.classList.remove("grey");
},4000);
}

/* METHOD SPIN */
function spinMethod(){
let i=Math.floor(Math.random()*methods.length);
let deg=360/methods.length;
let stop=360-(i*deg)-deg/2;

rot2+=360*5+stop-(rot2%360);
wheel2.style.transform=`rotate(${rot2}deg)`;

setTimeout(()=>{
let m=methods[i];
document.getElementById("method").innerText=m;

if(m==="Karaoke"){
let r=confirm("Did team sing?");
addScore(r?100:0);
}else{
let r=prompt("song / artist / both / none");
if(r==="song") addScore(10);
else if(r==="artist") addScore(15);
else if(r==="both") addScore(50);
else addScore(0);
}

},4000);
}

/* SCORE */
function addScore(p){
if(current===1){
score1+=p;
document.getElementById("s1").innerText=score1;
current=2;
}else{
score2+=p;
document.getElementById("s2").innerText=score2;
current=1;
round++;
}

if(round>5){endGame();return;}

document.getElementById("round").innerText="Round "+round+"/5";
document.getElementById("turn").innerText=(current===1?t1:t2)+" Turn";

document.getElementById("spin2").disabled=true;
wheel2.classList.add("grey");
}

/* TIMER */
let time=90,run=false,int;

function toggleTimer(){
if(!run){
run=true;
timerBtn.innerText="Stop";
int=setInterval(()=>{
time--;
let m=Math.floor(time/60);
let s=time%60;
timer.innerText=m+":"+(s<10?"0"+s:s);
if(time<=0) clearInterval(int);
},1000);
}else{
run=false;
clearInterval(int);
timerBtn.innerText="Start";
}
}

/* END */
function endGame(){
let win=score1>score2?t1:t2;
document.getElementById("game").style.display="none";
document.getElementById("winner").style.display="flex";
document.getElementById("winnerName").innerText=win+" WINS!";
}

</script>

</body>
</html>
